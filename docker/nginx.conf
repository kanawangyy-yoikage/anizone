# ═══════════════════════════════════════════════════════
#  ANIZONE — Nginx Config
#  /php/api/*  → PHP-FPM (port 9000)
#  /api/*      → Express Node.js (port 3000)
#  /*          → Static files (tanpa .html di URL)
# ═══════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;

    root /app/public;
    index index.html;

    # ── PHP API ─────────────────────────────────────────
    location /php/api/ {
        # Keamanan: larang akses ke config & firebase helper
        location ~ /php/api/(config|firebase)\.php$ {
            deny all;
            return 403;
        }

        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME /app$fastcgi_script_name;
        fastcgi_param  DOCUMENT_ROOT   /app/public;
        fastcgi_read_timeout 30;
    }

    # ── Node.js / Express API ────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30;
    }

    # ── Redirect: hilangkan .html dari URL ──────────────
    # Kalau ada yang akses /login.html → redirect ke /login
    location ~ ^/(.+)\.html$ {
        return 301 /$1;
    }

    # ── Clean URL: /login → serve login.html ────────────
    location / {
        # Coba: file asli → file.html → folder/index.html → fallback index.html
        try_files $uri $uri.html $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public";
    }

    # ── Gzip ────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
