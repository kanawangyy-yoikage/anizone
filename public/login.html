<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AniZone — Masuk</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0d0f14;
            --bg-card: #161920;
            --bg-input: #1e2129;
            --primary: #A8C7FA;
            --accent: #4285F4;
            --accent2: #7BAEF8;
            --text-main: #E2E2E9;
            --text-muted: #9aa0b4;
            --border-color: #2a2d37;
            --surface-high: #1e2129;
            --gradient: linear-gradient(135deg, #4285F4 0%, #A8C7FA 100%);
            --shape-sm: 12px;
            --shape-md: 16px;
            --shape-lg: 24px;
            --shape-full: 50px;
            --glow: 0 0 20px rgba(66, 133, 244, 0.3);
            --error: #f87171;
            --success: #4ade80;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        .bg-orbs {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 8s ease-in-out infinite;
            opacity: 0.15;
        }
        .orb-1 { width: 500px; height: 500px; background: #4285F4; top: -150px; left: -150px; animation-delay: 0s; }
        .orb-2 { width: 350px; height: 350px; background: #A8C7FA; bottom: -100px; right: -100px; animation-delay: -4s; }
        .orb-3 { width: 250px; height: 250px; background: #7BAEF8; top: 50%; left: 60%; animation-delay: -2s; opacity: 0.08; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Card */
        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(22, 25, 32, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: var(--shape-lg);
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            margin: 20px;
            animation: fadeInUp 0.6s cubic-bezier(0.2, 0, 0, 1);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(168,199,250,0.05);
        }

        /* Logo */
        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
        }
        .logo-img {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            margin-bottom: 12px;
            box-shadow: var(--glow);
        }
        .logo-title {
            font-size: 26px;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            background: var(--bg-input);
            border-radius: var(--shape-sm);
            padding: 4px;
            margin-bottom: 28px;
            gap: 4px;
        }
        .auth-tab {
            flex: 1;
            padding: 9px 12px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 600;
            border-radius: 9px;
            cursor: pointer;
            transition: all 0.25s;
        }
        .auth-tab.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 12px rgba(66,133,244,0.4);
        }

        /* Method selector */
        .method-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .method-btn {
            flex: 1;
            padding: 10px 8px;
            border: 1.5px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
            font-size: 12px;
            font-weight: 600;
            border-radius: var(--shape-sm);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .method-btn:hover { border-color: var(--accent2); color: var(--text-main); }
        .method-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(66,133,244,0.1); }
        .method-btn svg { width: 20px; height: 20px; }

        /* Form */
        .form-section { display: none; animation: slideDown 0.3s ease; }
        .form-section.active { display: block; }

        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 7px;
        }
        .form-input {
            width: 100%;
            padding: 13px 16px;
            background: var(--bg-input);
            border: 1.5px solid var(--border-color);
            border-radius: var(--shape-sm);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(66,133,244,0.15);
        }
        .form-input::placeholder { color: var(--text-muted); opacity: 0.6; }
        .input-wrapper { position: relative; }
        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            display: flex;
        }
        .toggle-pw:hover { color: var(--text-main); }

        /* Phone prefix */
        .phone-wrapper { display: flex; gap: 8px; }
        .phone-prefix {
            padding: 13px 14px;
            background: var(--bg-input);
            border: 1.5px solid var(--border-color);
            border-radius: var(--shape-sm);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }
        .phone-wrapper .form-input { flex: 1; }

        /* Submit btn */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--gradient);
            background-size: 200% 200%;
            animation: gradientMove 4s ease infinite;
            border: none;
            border-radius: var(--shape-sm);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(66,133,244,0.4); }
        .btn-submit:active { transform: translateY(0); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-spinner {
            width: 18px; height: 18px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        /* Google btn */
        .btn-google {
            width: 100%;
            padding: 13px;
            background: var(--bg-input);
            border: 1.5px solid var(--border-color);
            border-radius: var(--shape-sm);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-google:hover {
            border-color: #4285F4;
            background: rgba(66,133,244,0.08);
            transform: translateY(-1px);
        }
        .btn-google svg { width: 20px; height: 20px; }

        /* OTP */
        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 16px 0;
        }
        .otp-input {
            width: 48px;
            height: 54px;
            text-align: center;
            background: var(--bg-input);
            border: 1.5px solid var(--border-color);
            border-radius: var(--shape-sm);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 700;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .otp-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(66,133,244,0.15);
        }

        /* reCAPTCHA container */
        #recaptcha-container { margin-bottom: 12px; }

        /* Toast / Alert */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--shape-sm);
            padding: 12px 20px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 999;
            transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
            max-width: 360px;
            min-width: 260px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { border-color: var(--error); color: var(--error); }
        .toast.success { border-color: var(--success); color: var(--success); }
        .toast-icon { font-size: 16px; }

        /* Forgot / links */
        .form-link {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 14px;
        }
        .form-link a {
            color: var(--accent2);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .form-link a:hover { text-decoration: underline; }

        /* Step nav */
        .step-back {
            display: flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            cursor: pointer;
            padding: 0;
            margin-bottom: 16px;
            transition: color 0.2s;
        }
        .step-back:hover { color: var(--text-main); }

        .step-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .step-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .step-desc span { color: var(--accent2); font-weight: 600; }

        #phone-sent-to { color: var(--accent2); }

        .resend-link {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 10px;
        }
        .resend-link a { color: var(--accent2); cursor: pointer; font-weight: 600; }
        .resend-link a:hover { text-decoration: underline; }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(13,15,20,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
            display: none;
        }
        .loading-overlay.show { display: flex; }
        .loading-spinner {
            width: 44px; height: 44px;
            border: 3.5px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
    </style>
</head>
<body>

<div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast">
    <span class="toast-icon" id="toast-icon">⚠️</span>
    <span id="toast-msg">Pesan</span>
</div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
</div>

<!-- reCAPTCHA invisible -->
<div id="recaptcha-container"></div>

<div class="login-card" id="loginCard">

    <!-- Logo -->
    <div class="logo-section">
        <img src="pp.png" alt="AniZone" class="logo-img" onerror="this.style.display='none'">
        <div class="logo-title">AniZone</div>
        <div class="logo-sub">Streaming Anime HD Tanpa Iklan</div>
    </div>

    <!-- PANEL: LOGIN / REGISTER TABS -->
    <div id="panel-main">
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchAuthTab('login')">Masuk</button>
            <button class="auth-tab" onclick="switchAuthTab('register')">Daftar</button>
        </div>

        <!-- Method selector -->
        <div class="method-selector">
            <button class="method-btn active" onclick="switchMethod('email')" id="m-email">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                Email
            </button>
            <button class="method-btn" onclick="switchMethod('phone')" id="m-phone">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.63A2 2 0 012 0h3a2 2 0 012 1.72c.127 1.44.35 2.864.67 4.26a2 2 0 01-.45 2.11L6.09 9.18A16 16 0 0014.82 17.91l1.05-1.13a2 2 0 012.11-.45c1.397.32 2.82.543 4.26.67A2 2 0 0122 16.92z"/></svg>
                HP
            </button>
            <button class="method-btn" onclick="loginGoogle()" id="m-google">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Google
            </button>
        </div>

        <!-- EMAIL FORM -->
        <div class="form-section active" id="form-email">
            <div class="form-group">
                <label class="form-label">Alamat Email</label>
                <input type="email" class="form-input" id="emailInput" placeholder="email@kamu.com" autocomplete="email">
            </div>
            <div class="form-group" id="nameGroup" style="display:none">
                <label class="form-label">Nama Tampilan</label>
                <input type="text" class="form-input" id="nameInput" placeholder="Nama kamu" autocomplete="name">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <input type="password" class="form-input" id="passwordInput" placeholder="Minimal 6 karakter" style="padding-right:44px" autocomplete="current-password">
                    <button class="toggle-pw" onclick="togglePassword('passwordInput', this)" tabindex="-1">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <div class="form-group" id="confirmGroup" style="display:none">
                <label class="form-label">Konfirmasi Password</label>
                <div class="input-wrapper">
                    <input type="password" class="form-input" id="confirmInput" placeholder="Ulangi password" style="padding-right:44px">
                    <button class="toggle-pw" onclick="togglePassword('confirmInput', this)" tabindex="-1">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <button class="btn-submit" id="btnEmail" onclick="submitEmail()">
                <span id="btnEmailText">Masuk</span>
            </button>
            <div class="form-link" id="forgotLink">
                <a onclick="showForgot()">Lupa password?</a>
            </div>
        </div>

        <!-- PHONE FORM -->
        <div class="form-section" id="form-phone">
            <div class="form-group">
                <label class="form-label">Nomor HP</label>
                <div class="phone-wrapper">
                    <div class="phone-prefix">+62</div>
                    <input type="tel" class="form-input" id="phoneInput" placeholder="8123456789" autocomplete="tel">
                </div>
            </div>
            <button class="btn-submit" id="btnPhone" onclick="sendOTP()">
                <span id="btnPhoneText">Kirim Kode OTP</span>
            </button>
        </div>

    </div>

    <!-- PANEL: OTP VERIFICATION -->
    <div id="panel-otp" style="display:none">
        <button class="step-back" onclick="backToMain()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Kembali
        </button>
        <div class="step-title">Verifikasi OTP</div>
        <div class="step-desc">Kode 6 digit dikirim ke <span id="phone-sent-to"></span></div>

        <div class="otp-inputs">
            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" oninput="otpMove(this,1)" onkeydown="otpBack(this,event)">
            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" oninput="otpMove(this,2)" onkeydown="otpBack(this,event)">
            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" oninput="otpMove(this,3)" onkeydown="otpBack(this,event)">
            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" oninput="otpMove(this,4)" onkeydown="otpBack(this,event)">
            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" oninput="otpMove(this,5)" onkeydown="otpBack(this,event)">
            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" oninput="otpMove(this,6)" onkeydown="otpBack(this,event)">
        </div>

        <button class="btn-submit" onclick="verifyOTP()">
            <span>Verifikasi & Masuk</span>
        </button>
        <div class="resend-link">Tidak terima kode? <a onclick="resendOTP()">Kirim ulang</a></div>
    </div>

    <!-- PANEL: FORGOT PASSWORD -->
    <div id="panel-forgot" style="display:none">
        <button class="step-back" onclick="backToMain()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Kembali
        </button>
        <div class="step-title">Reset Password</div>
        <div class="step-desc">Masukkan email kamu, kami akan kirim link reset password.</div>
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="resetEmail" placeholder="email@kamu.com">
        </div>
        <button class="btn-submit" onclick="sendResetEmail()">Kirim Link Reset</button>
    </div>

</div>

<!-- Firebase SDK v9 (compat) -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// State
let currentMode = 'login'; // login | register
let currentMethod = 'email';
let confirmationResult = null;
let recaptchaVerifier = null;

// --- AUTH STATE LISTENER ---
// TIDAK auto-redirect saat user sudah login — biarkan user di halaman login
// Redirect hanya terjadi setelah user sengaja klik tombol login/daftar
auth.onAuthStateChanged(() => { /* sengaja dikosongkan */ });

async function saveUserToFirestore(user) {
    try {
        const ref = db.collection('users').doc(user.uid);
        const snap = await ref.get();
        if (!snap.exists) {
            await ref.set({
                uid: user.uid,
                email: user.email || null,
                displayName: user.displayName || 'Pengguna AniZone',
                phone: user.phoneNumber || null,
                photoURL: user.photoURL || null,
                role: 'user',
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                lastLogin: firebase.firestore.FieldValue.serverTimestamp()
            });
        } else {
            await ref.update({ lastLogin: firebase.firestore.FieldValue.serverTimestamp() });
        }
    } catch(e) { console.error('Firestore error:', e); }
}

async function checkIsAdmin(uid) {
    try {
        const doc = await db.collection('users').doc(uid).get();
        return doc.exists && doc.data().role === 'admin';
    } catch { return false; }
}

// --- UI HELPERS ---
function showLoading(v) {
    document.getElementById('loadingOverlay').classList.toggle('show', v);
}

let toastTimer;
function showToast(msg, type = 'error') {
    const t = document.getElementById('toast');
    const icon = document.getElementById('toast-icon');
    document.getElementById('toast-msg').textContent = msg;
    t.className = 'toast ' + type;
    icon.textContent = type === 'success' ? '✅' : '⚠️';
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

function setLoading(btnId, loading, text) {
    const btn = document.getElementById(btnId);
    const textEl = btn.querySelector('span');
    const existing = btn.querySelector('.btn-spinner');
    if (loading) {
        btn.disabled = true;
        if (!existing) {
            const s = document.createElement('div');
            s.className = 'btn-spinner';
            btn.insertBefore(s, textEl);
        }
    } else {
        btn.disabled = false;
        if (existing) existing.remove();
        if (text) textEl.textContent = text;
    }
}

// --- TAB & METHOD SWITCH ---
function switchAuthTab(mode) {
    currentMode = mode;
    document.querySelectorAll('.auth-tab').forEach((t,i) => {
        t.classList.toggle('active', (i===0 && mode==='login') || (i===1 && mode==='register'));
    });
    // Toggle register fields
    document.getElementById('nameGroup').style.display = mode === 'register' ? 'block' : 'none';
    document.getElementById('confirmGroup').style.display = mode === 'register' ? 'block' : 'none';
    document.getElementById('forgotLink').style.display = mode === 'login' ? 'block' : 'none';
    document.getElementById('btnEmailText').textContent = mode === 'register' ? 'Daftar' : 'Masuk';
    // Reset recaptcha for phone on mode switch
    if (currentMethod === 'phone') resetRecaptcha();
}

function switchMethod(method) {
    currentMethod = method;
    document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('m-' + method).classList.add('active');
    document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
    document.getElementById('form-' + method).classList.add('active');
    if (method === 'phone') setupRecaptcha();
}

// --- EMAIL AUTH ---
async function submitEmail() {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const name = document.getElementById('nameInput').value.trim();
    const confirm = document.getElementById('confirmInput').value;

    if (!email || !password) return showToast('Email dan password wajib diisi');
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showToast('Format email tidak valid');
    if (password.length < 6) return showToast('Password minimal 6 karakter');

    if (currentMode === 'register') {
        if (!name) return showToast('Nama tampilan wajib diisi');
        if (password !== confirm) return showToast('Password tidak cocok');
    }

    setLoading('btnEmail', true);
    try {
        if (currentMode === 'register') {
            const cred = await auth.createUserWithEmailAndPassword(email, password);
            await cred.user.updateProfile({ displayName: name });
        } else {
            await auth.signInWithEmailAndPassword(email, password);
        }
        window.location.replace('index.html');
    } catch(e) {
        setLoading('btnEmail', false, currentMode === 'register' ? 'Daftar' : 'Masuk');
        showToast(getErrorMsg(e.code));
    }
}

// --- GOOGLE AUTH ---
async function loginGoogle() {
    showLoading(true);
    try {
        const provider = new firebase.auth.GoogleAuthProvider();
        await auth.signInWithPopup(provider);
        window.location.replace('index.html');
    } catch(e) {
        showLoading(false);
        if (e.code !== 'auth/popup-closed-by-user') showToast(getErrorMsg(e.code));
    }
}

// --- PHONE AUTH ---
function setupRecaptcha() {
    if (recaptchaVerifier) return;
    recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
        size: 'invisible',
        callback: () => {}
    });
    recaptchaVerifier.render();
}

function resetRecaptcha() {
    if (recaptchaVerifier) {
        recaptchaVerifier.clear();
        recaptchaVerifier = null;
    }
    document.getElementById('recaptcha-container').innerHTML = '';
    setupRecaptcha();
}

async function sendOTP() {
    let phone = document.getElementById('phoneInput').value.trim();
    if (!phone) return showToast('Masukkan nomor HP');
    // Bersihkan awalan 0
    phone = phone.replace(/^0/, '');
    if (!/^\d{8,13}$/.test(phone)) return showToast('Nomor HP tidak valid (8-13 digit)');

    const fullPhone = '+62' + phone;
    setLoading('btnPhone', true);

    try {
        if (!recaptchaVerifier) setupRecaptcha();
        confirmationResult = await auth.signInWithPhoneNumber(fullPhone, recaptchaVerifier);
        document.getElementById('phone-sent-to').textContent = fullPhone;
        showPanel('otp');
        setLoading('btnPhone', false, 'Kirim Kode OTP');
    } catch(e) {
        setLoading('btnPhone', false, 'Kirim Kode OTP');
        resetRecaptcha();
        showToast(getErrorMsg(e.code));
    }
}

async function resendOTP() {
    resetRecaptcha();
    showPanel('main');
    showToast('Silakan kirim ulang OTP', 'success');
}

// --- OTP INPUT ---
function otpMove(el, idx) {
    el.value = el.value.replace(/\D/g,'');
    if (el.value && idx < 6) {
        const inputs = document.querySelectorAll('.otp-input');
        inputs[idx].focus();
    }
    // Auto verify if all filled
    const all = [...document.querySelectorAll('.otp-input')].map(i=>i.value).join('');
    if (all.length === 6) verifyOTP();
}

function otpBack(el, e) {
    if (e.key === 'Backspace' && !el.value) {
        const inputs = document.querySelectorAll('.otp-input');
        const idx = [...inputs].indexOf(el);
        if (idx > 0) inputs[idx-1].focus();
    }
}

async function verifyOTP() {
    const code = [...document.querySelectorAll('.otp-input')].map(i=>i.value).join('');
    if (code.length < 6) return showToast('Masukkan 6 digit kode OTP');
    showLoading(true);
    try {
        await confirmationResult.confirm(code);
        window.location.replace('index.html');
    } catch(e) {
        showLoading(false);
        showToast(getErrorMsg(e.code));
        document.querySelectorAll('.otp-input').forEach(i => i.value='');
        document.querySelector('.otp-input').focus();
    }
}

// --- FORGOT PASSWORD ---
function showForgot() { showPanel('forgot'); }

async function sendResetEmail() {
    const email = document.getElementById('resetEmail').value.trim();
    if (!email) return showToast('Masukkan email');
    showLoading(true);
    try {
        await auth.sendPasswordResetEmail(email);
        showLoading(false);
        showToast('Link reset dikirim ke ' + email, 'success');
        setTimeout(() => showPanel('main'), 2000);
    } catch(e) {
        showLoading(false);
        showToast(getErrorMsg(e.code));
    }
}

// --- PANEL NAVIGATION ---
function showPanel(name) {
    document.getElementById('panel-main').style.display = name === 'main' ? 'block' : 'none';
    document.getElementById('panel-otp').style.display = name === 'otp' ? 'block' : 'none';
    document.getElementById('panel-forgot').style.display = name === 'forgot' ? 'block' : 'none';
}

function backToMain() { showPanel('main'); }

// --- PASSWORD TOGGLE ---
function togglePassword(id, btn) {
    const input = document.getElementById(id);
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.innerHTML = isHidden
        ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
        : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
}

// --- ERROR MESSAGES ---
function getErrorMsg(code) {
    const msgs = {
        'auth/invalid-email': 'Format email tidak valid',
        'auth/user-not-found': 'Akun tidak ditemukan',
        'auth/wrong-password': 'Password salah',
        'auth/email-already-in-use': 'Email sudah terdaftar',
        'auth/weak-password': 'Password terlalu lemah (min 6 karakter)',
        'auth/too-many-requests': 'Terlalu banyak percobaan, coba lagi nanti',
        'auth/network-request-failed': 'Tidak ada koneksi internet',
        'auth/invalid-verification-code': 'Kode OTP tidak valid',
        'auth/code-expired': 'Kode OTP kadaluarsa, kirim ulang',
        'auth/invalid-phone-number': 'Nomor HP tidak valid',
        'auth/quota-exceeded': 'Kuota SMS habis, coba besok',
        'auth/popup-blocked': 'Popup diblokir browser, izinkan popup',
        'auth/account-exists-with-different-credential': 'Akun sudah ada dengan metode login berbeda',
        'auth/user-disabled': 'Akun dinonaktifkan oleh admin',
        'auth/operation-not-allowed': 'Metode login ini belum diaktifkan',
        'auth/invalid-credential': 'Kredensial tidak valid atau kadaluarsa',
    };
    return msgs[code] || 'Terjadi kesalahan: ' + (code || 'tidak diketahui');
}

// Init
setupRecaptcha();
</script>
