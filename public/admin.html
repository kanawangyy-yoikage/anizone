<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AniZone — Admin Panel</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="admin-wrapper">

  <!-- SIDEBAR -->
  <aside class="admin-sidebar">
    <div class="admin-sidebar-header">
      <div class="admin-logo">
        <div class="admin-logo-icon">A</div>
        <div>
          <div class="admin-logo-text">AniZone</div>
          <div class="admin-logo-sub">Admin Panel</div>
        </div>
      </div>
      <div class="admin-user-chip">
        <div class="admin-user-avatar">
          <img id="adminAvatarImg" src="" alt="" style="display:none">
          <span id="adminInitial">A</span>
        </div>
        <div class="admin-user-info">
          <div class="admin-user-name" id="adminName">Memuat...</div>
          <div class="admin-user-role">Administrator</div>
        </div>
      </div>
    </div>

    <nav class="admin-nav">
      <div class="admin-nav-section-label">Menu Utama</div>
      <div class="admin-nav-item active" id="nav-dashboard" onclick="switchAdminTab('dashboard')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </div>
      <div class="admin-nav-item" id="nav-users" onclick="switchAdminTab('users')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Manajemen Pengguna
        <span class="admin-nav-badge" id="userCountBadge">—</span>
      </div>
      <div class="admin-nav-item" id="nav-activity" onclick="switchAdminTab('activity')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Log Aktivitas
      </div>
      <div class="admin-nav-section-label">Sistem</div>
      <div class="admin-nav-item" id="nav-settings" onclick="switchAdminTab('settings')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
        Pengaturan
      </div>
    </nav>

    <div class="admin-nav-footer">
      <a href="index.html" class="admin-back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Kembali ke AniZone
      </a>
      <div class="admin-logout-btn" onclick="adminLogout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Keluar
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="admin-main">
    <div id="view-dashboard"></div>
    <div id="view-users"    style="display:none"></div>
    <div id="view-activity" style="display:none"></div>
    <div id="view-settings" style="display:none"></div>
  </main>

</div>

<!-- USER DETAIL MODAL -->
<div class="modal-overlay" id="user-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Detail Pengguna</div>
      <button class="modal-close" onclick="closeModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modal-content"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toast-container"></div>

<!-- SCRIPTS -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/admin.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (localStorage.getItem('theme') === 'light')
      document.documentElement.setAttribute('data-theme', 'light');
  });
</script>
</body>
</html>
